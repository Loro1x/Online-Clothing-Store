<!DOCTYPE html>
<html>
<head>
    <title>Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h1>Shop</h1>

    <div class="row">

        <div class="col-md-4">
            <div class="card">
                <img src="images/hoodie.jpg" class="card-img-top">
                <div class="card-body">
                    <h5>Black Hoodie</h5>
                    <p>KES 3,500</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <img src="images/jacket.jpg" class="card-img-top">
                <div class="card-body">
                    <h5>Denim Jacket</h5>
                    <p>KES 4,500</p>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
